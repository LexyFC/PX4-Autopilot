module_name: battery_simulator
parameters:
- group: SITL
  definitions:
    SIM_BAT_DRAIN:
      description:
        short: Simulator Battery drain interval
        long: |-
          Set to 0 to entirely disable the battery simulator.
          This is useful when the battery is simulated externally and interfaced with PX4, for example through MAVLink.
      type: float
      default: 60
      min: 0
      max: 86400
      increment: 1
      unit: s
    SIM_BAT_MIN_PCT:
      description:
        short: Simulator Battery minimal percentage
        long: |-
          Can be used to alter the battery level during SITL- or HITL-simulation on the fly.
          Particularly useful for testing different low-battery behaviour.
      type: float
      default: 50.0
      min: 0
      max: 100
      increment: 0.1
      unit: '%'
